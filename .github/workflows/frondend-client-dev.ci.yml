name: Frontend Client CI/CD

on:
  push:
    branches: ["master"]
    paths:
      - "frontend-client/**"

jobs:
  frontend-client-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

      - name: Build frontend-client Docker image
        run: docker build -t myusername/frontend-client:latest ./frontend-client

      - name: Push frontend-client Docker image
        run: docker push myusername/frontend-client:latest

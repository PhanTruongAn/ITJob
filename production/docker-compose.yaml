version: "3.8"

services:
  job-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      - job-network
    depends_on:
      - job-db

  job-db:
    image: postgres:15
    environment:
      POSTGRES_DB: itjob
      POSTGRES_PASSWORD: "123456"
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    networks:
      - job-network

networks:
  job-network:
    driver: bridge

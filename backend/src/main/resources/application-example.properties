spring.application.name=backend

# --- Database configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:postgresql://localhost:5432/itjob
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true

# Configure pagination to start from page 1
spring.data.web.pageable.one-indexed-parameters=true

# --- JWT configuration ---
jwt.base64-secret=
jwt.access-token-validity-in-seconds=86400  # 1 day
jwt.refresh-token-validity-in-seconds=8640000  # 100 days

# --- Cloudinary configuration ---
cloudinary.cloud-name=
cloudinary.api-key=
cloudinary.api-secret=
cloudinary.upload-preset=

# --- File upload configuration ---
# spring.servlet.multipart.max-file-size=50MB
# spring.servlet.multipart.max-request-size=50MB

# --- Email configuration ---
spring.mail.host=
spring.mail.port=
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=
spring.mail.properties.mail.smtp.starttls.enable=